<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário de Reembolso</title>
</head>
<body>
    
    <main>
        
        <form class="formulário">

            <div>
        <h1>Formulário de Reembolso</h1>
        </div>

            <div class="cadastro">
            <label>Nome Completo:</label>
            <input type="text" class="name" id="nomeCliente">

            <label>Email:</label>
            <input type="mail" class="mail" id="emailCliente">
            </div>

            <div class="produto">

        <h2>Qual produto que você deseja reembolsar?</h2>


         <label>
            <input type="radio">
           Software de Contabilidade
          </label>

            <label>
            <input type="radio">
            Software de Gestão de Projetos
            </label>

             <label>
            <input type="radio">
            Software de Edição de Vídeo
            </label>

             <label>
            <input type="radio">
            Plataforma de criação de Site</label>

             <label>
            <input type="radio">
            Plataforma de CRM de Vendas</label>

              </div>
         
        
        <div>

        <h2>Comente aqui o que houve:</h2>

        <textarea id="motivoReembolso">

        </textarea>

        </div>

        <div class="box-button">
        <button type="submit">Solicitar Reembolso</button>
        </div>

        </form>

    </main>   
</body>

<script src="scrypt.js"></script>
</html>
